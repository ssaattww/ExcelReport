name: Publish NuGet Package

on:
  release:
    types:
      - published
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          version_prefix=$(grep -oPm1 '(?<=<VersionPrefix>)[^<]+' ExcelReport/ExcelReportLib/ExcelReportLib.csproj || echo "0.1.0")

          if [[ "${{ github.event_name }}" == "release" ]]; then
            tag_name="${{ github.event.release.tag_name }}"
            is_prerelease="${{ github.event.release.prerelease }}"
            base_version="${tag_name#v}"

            if [[ "$is_prerelease" == "true" ]]; then
              if [[ "$base_version" == *-* ]]; then
                package_version="$base_version"
              else
                package_version="${base_version}-pre.${GITHUB_RUN_NUMBER}"
              fi
            else
              if [[ "$base_version" == *-* ]]; then
                echo "Release is not pre-release, but tag contains a pre-release suffix: $tag_name"
                exit 1
              fi
              package_version="$base_version"
            fi
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref_name }}" == "master" ]]; then
            latest_stable_tag=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)
            if [[ -n "$latest_stable_tag" ]]; then
              base_version="${latest_stable_tag#v}"
              commits_since_base=$(git rev-list --count "${latest_stable_tag}..HEAD")
            else
              base_version="${version_prefix}"
              commits_since_base=$(git rev-list --count HEAD)
            fi

            if [[ ! "$base_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Invalid base version format: $base_version"
              exit 1
            fi

            IFS='.' read -r major minor patch <<< "$base_version"
            if [[ "$commits_since_base" -lt 1 ]]; then
              commits_since_base=1
            fi

            next_patch=$((patch + commits_since_base))
            package_version="${major}.${minor}.${next_patch}-pre.${GITHUB_RUN_NUMBER}"
          else
            package_version="${version_prefix}-ci.${GITHUB_RUN_NUMBER}"
          fi

          if [[ -z "$package_version" ]]; then
            echo "Failed to resolve package version."
            exit 1
          fi

          echo "version_prefix=${version_prefix}" >> "$GITHUB_OUTPUT"
          echo "package_version=${package_version}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore ExcelReport/ExcelReportLib/ExcelReportLib.csproj

      - name: Build
        run: dotnet build ExcelReport/ExcelReportLib/ExcelReportLib.csproj --configuration Release --no-restore

      - name: Pack
        run: |
          dotnet pack ExcelReport/ExcelReportLib/ExcelReportLib.csproj \
            --configuration Release \
            --no-build \
            --output ./artifacts \
            -p:ContinuousIntegrationBuild=true \
            -p:PackageVersion=${{ steps.version.outputs.package_version }}

      - name: Validate NuGet API key
        if: ${{ env.NUGET_API_KEY == '' }}
        run: |
          echo "NUGET_API_KEY secret is not set."
          exit 1

      - name: Publish to NuGet.org
        if: ${{ env.NUGET_API_KEY != '' }}
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --api-key "${{ env.NUGET_API_KEY }}" \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate

