name: PR xUnit Tests

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  xunit-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore test project
        run: dotnet restore ExcelReport/ExcelReportLib.Tests/ExcelReportLib.Tests.csproj

      - name: Run xUnit tests
        run: dotnet test ExcelReport/ExcelReportLib.Tests/ExcelReportLib.Tests.csproj --configuration Release --no-restore --verbosity minimal
