<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="470" viewBox="0 0 1040 470">
  <style>
    .title { font: bold 18px Calibri, sans-serif; fill: #222; }
    .sub { font: 12px Calibri, sans-serif; fill: #555; }
    .hdr { font: 12px Calibri, sans-serif; fill: #333; }
    .txt { font: 12px Calibri, sans-serif; fill: #111; }
    .head { fill: #f3f3f3; stroke: #c9c9c9; stroke-width: 1; }
    .cell { fill: #fff; stroke: #d9d9d9; stroke-width: 1; }
    .solid { stroke: #222; stroke-width: 1.6; fill: none; }
    .dashed { stroke: #222; stroke-width: 1.3; stroke-dasharray: 6 4; fill: none; }
  </style>

  <text x="20" y="28" class="title">GroupBlock 挿入元インスタンス（C#データ展開後）</text>
  <text x="20" y="48" class="sub">本節サンプルデータから生成された GroupBlock 実体。左: 機械部品 / 右: 電材。</text>

  <g transform="translate(50,90)">
    <text x="0" y="-10" class="hdr">instance #1 (@group.Name = 機械部品)</text>

    <rect x="0" y="0" width="56" height="34" class="head"/>
    <rect x="56" y="0" width="230" height="34" class="head"/>
    <rect x="286" y="0" width="120" height="34" class="head"/>
    <rect x="406" y="0" width="120" height="34" class="head"/>

    <text x="20" y="22" class="hdr">Row</text>
