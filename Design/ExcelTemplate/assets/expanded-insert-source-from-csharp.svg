    <rect x="0" y="86" width="56" height="52" class="head"/><rect x="56" y="86" width="230" height="52" class="cell"/><rect x="286" y="86" width="120" height="52" class="cell"/><rect x="406" y="86" width="120" height="52" class="cell"/>
    <rect x="0" y="138" width="56" height="52" class="head"/><rect x="56" y="138" width="230" height="52" class="cell"/><rect x="286" y="138" width="120" height="52" class="cell"/><rect x="406" y="138" width="120" height="52" class="cell"/>
    <rect x="0" y="190" width="56" height="52" class="head"/><rect x="56" y="190" width="230" height="52" class="cell"/><rect x="286" y="190" width="120" height="52" class="cell"/><rect x="406" y="190" width="120" height="52" class="cell"/>

    <text x="22" y="66" class="hdr">1</text><text x="22" y="118" class="hdr">2</text><text x="22" y="170" class="hdr">3</text><text x="22" y="222" class="hdr">4</text>

