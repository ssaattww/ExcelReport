    <rect x="0" y="86" width="56" height="52" class="head"/><rect x="56" y="86" width="230" height="52" class="cell"/><rect x="286" y="86" width="120" height="52" class="cell"/><rect x="406" y="86" width="120" height="52" class="cell"/>

